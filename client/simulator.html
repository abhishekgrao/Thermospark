<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mysuru Location Analysis</title>
  <meta name="description" content="Map-based urban heat, greenery, and density analysis." />
  <meta name="theme-color" content="#020617" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&display=swap" rel="stylesheet" />
</head>
<body class="dashboard-body">

  <nav class="hero-page-nav" id="simulator-nav">
    <div class="nav-logo">
      <span class="nav-brand-dot"></span>
      ThermoSpark
    </div>
    <a href="/index.html" class="nav-sim-link">
      ← Back to Explore
    </a>
  </nav>

  <div class="dashboard-layout">
    <!-- LEFT: Sidebar (30%) -->
    <aside class="dashboard-sidebar">
      <h1 class="sidebar-title">Location Analysis</h1>
      <p class="sidebar-subtitle">Click anywhere on the map to analyze urban conditions.</p>
      
      <div id="loading-state" class="loading-state hidden">
        <div class="spinner"></div>
        <p>Analyzing area...</p>
      </div>

      <div id="analysis-results" class="analysis-results">
        <!-- Default State -->
        <div id="default-state" class="default-state">
          <span>Select a location to view data.</span>
        </div>

        <!-- Populated Results (Hidden initally) -->
        <div id="data-state" class="data-state hidden">
          <div class="metric-group">
            <label>Location (Lat, Lon)</label>
            <div id="val-location" class="metric-value code-font">-</div>
          </div>

          <div class="metric-cards">
            <!-- Weather Data -->
            <div class="metric-card">
              <div class="card-icon">🌡️</div>
              <label>Temperature</label>
              <div id="val-temp" class="metric-value">--°C</div>
            </div>
            
            <div class="metric-card">
              <div class="card-icon">⛅</div>
              <label>Weather</label>
              <div id="val-weather" class="metric-value normalize-text">--</div>
            </div>

            <div class="metric-card">
              <div class="card-icon">💨</div>
              <label>Wind Speed</label>
              <div id="val-wind" class="metric-value">-- m/s</div>
            </div>

            <div class="metric-card">
              <div class="card-icon">🌧️</div>
              <label>Rain</label>
              <div id="val-rain" class="metric-value">--</div>
            </div>
            
            <!-- Real World API Data -->
            <div class="metric-card density-card">
              <div class="card-icon">🏙️</div>
              <label>Building Density</label>
              <div id="val-density" class="metric-value badge-metric">--</div>
              <div id="hint-density" class="metric-hint">Based on 300m radius</div>
            </div>

            <div class="metric-card greenery-card">
              <div class="card-icon">🌿</div>
              <label>Greenery Cover</label>
              <div id="val-greenery" class="metric-value badge-metric">--</div>
              <div id="hint-greenery" class="metric-hint">Based on 300m radius</div>
            </div>
          </div>
        </div>
      </div>
      
    </aside>

    <!-- RIGHT: Map (70%) -->
    <main class="dashboard-map">
      <div id="sim-map" class="map-container"></div>
    </main>
  </div>

  <script type="module" src="/src/simulator-main.js"></script>
</body>
</html>
